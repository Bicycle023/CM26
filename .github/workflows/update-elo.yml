  name: Update Elo (eloratings.net -> elo.json)

  on:
    schedule:
      - cron: '17 5 * * *'
    workflow_dispatch: {}

  permissions:
    contents: write

  jobs:
    update:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: '20'
        - name: Genereaza elo.json
          run: node scripts/update-elo.mjs
        - name: Commit daca s-a schimbat
          run: |
            if git diff --quiet -- elo.json; then
              echo "Nicio schimbare in elo.json."
            else
              git config user.name "elo-bot"
              git config user.email "actions@users.noreply.github.com"
              git add elo.json
              git commit -m "Auto: update Elo $(date -u +%Y-%m-%d)"
              git push
            fi
